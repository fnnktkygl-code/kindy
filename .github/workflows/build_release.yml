name: Build and Release Android APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build APK and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "GOOGLE_SERVICES_JSON secret is empty. Using dummy config to allow build."
            cat << 'EOF' > android/app/google-services.json
            {
              "project_info": { "project_number": "123456789", "project_id": "dummy-project" },
              "client": [
                {
                  "client_info": { "mobilesdk_app_id": "1:123456789:android:abcdef", "android_client_info": { "package_name": "app.pigio.android" } },
                  "api_key": [ { "current_key": "dummy_key" } ]
                }
              ]
            }
          EOF
          else
            echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
          fi

      - name: Create Keystore and key.properties
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
            echo "storePassword=kindy2026" > android/key.properties
            echo "keyPassword=kindy2026" >> android/key.properties
            echo "keyAlias=upload" >> android/key.properties
            echo "storeFile=upload-keystore.jks" >> android/key.properties
          else
            echo "KEYSTORE_BASE64 secret is empty. Building with debug signature."
          fi

      - name: Build APK
        run: flutter build apk --release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
