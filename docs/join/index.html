<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Invitation Pigio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8f5f0;
      color: #2d2a26;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 48px 32px;
      max-width: 400px;
      width: 90%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .mascot { font-size: 80px; margin-bottom: 24px; }
    h1 { font-size: 22px; margin-bottom: 8px; color: #2d2a26; }
    .subtitle { color: #8a857e; font-size: 15px; margin-bottom: 32px; }
    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      margin-bottom: 12px;
      cursor: pointer;
      border: none;
    }
    .btn-primary { background: #e8a063; color: #fff; }
    .btn-secondary { background: #f0ece6; color: #2d2a26; }
    .expired { color: #c0392b; }
    .hidden { display: none; }
    .spinner { animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card" id="loading">
    <div class="mascot"><span class="spinner">🐦</span></div>
    <h1>Chargement...</h1>
  </div>

  <div class="card hidden" id="valid">
    <div class="mascot">🐦</div>
    <h1 id="invite-title"></h1>
    <p class="subtitle" id="invite-subtitle"></p>
    <a class="btn btn-primary" id="open-app" href="#">J'ai déjà l'app → Ouvrir</a>
    <a class="btn btn-secondary" id="download-ios" href="https://apps.apple.com/app/pigio/id0000000000" target="_blank">📱 Télécharger sur l'App Store</a>
    <a class="btn btn-secondary" id="download-android" href="https://play.google.com/store/apps/details?id=app.pigio.android" target="_blank">📱 Télécharger sur le Play Store</a>
  </div>

  <div class="card hidden" id="expired">
    <div class="mascot">🐦😔</div>
    <h1>Ce lien a expiré</h1>
    <p class="subtitle">Demandez un nouveau lien à votre ami(e).</p>
  </div>

  <script>
    const API_BASE = 'https://rlghoamehiqlqzjdyxcg.supabase.co/functions/v1';
    
    async function init() {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      const path = window.location.pathname;
      const ua = navigator.userAgent || '';
      const isAndroid = /android/i.test(ua);
      
      // Extract token from path like /join/TOKEN
      let inviteToken = token;
      if (!inviteToken && path.startsWith('/join/')) {
        inviteToken = path.split('/join/')[1];
      }
      
      if (!inviteToken) {
        show('expired');
        return;
      }

      // Strip token from URL bar immediately — prevents leakage via browser
      // history, referrer headers, and shoulder-surfing on rooted devices.
      try { window.history.replaceState({}, '', '/join/'); } catch (_) {}

      try {
        const resp = await fetch(`${API_BASE}/invite-status?token=${encodeURIComponent(inviteToken)}`);
        const data = await resp.json();
        
        if (!data.found || data.status === 'expired' || data.status === 'revoked') {
          show('expired');
          return;
        }

        const inviterName = data.inviterProfile?.name || data.inviterId || 'Quelqu\'un';
        document.getElementById('invite-title').textContent = `${inviterName} vous invite sur Pigio !`;
        document.getElementById('invite-subtitle').textContent = `Rejoignez ${inviterName} pour partager vos envies de cadeaux.`;
        
        // Deep link to app
        const safeToken = encodeURIComponent(inviteToken);
        const deepLink = `pigio://invite?token=${safeToken}`;
        const androidIntent = `intent://invite?token=${safeToken}#Intent;scheme=pigio;package=app.pigio.android;end`;
        const openHref = isAndroid ? androidIntent : deepLink;
        const openBtn = document.getElementById('open-app');
        openBtn.href = openHref;

        // Attempt to open app automatically, keep visible fallback button.
        setTimeout(() => {
          window.location.href = openHref;
        }, 100);
        
        show('valid');
      } catch (e) {
        show('expired');
      }
    }

    function show(id) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById(id).classList.remove('hidden');
    }

    init();
  </script>
</body>
</html>
