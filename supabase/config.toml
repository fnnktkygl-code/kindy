project_id = "pigio-local"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "https://pigio.app"
additional_redirect_urls = ["pigio://invite", "pigio://auth/callback", "com.pigio.app://auth/callback", "https://pigio.app/auth/callback"]
jwt_expiry = 900

[edge_runtime]
enabled = true
policy = "per_worker"

[functions.invite-open]
verify_jwt = false

[functions.invite-create]
verify_jwt = false

[functions.invite-resolve]
verify_jwt = false

[functions.invite-status]
verify_jwt = false
